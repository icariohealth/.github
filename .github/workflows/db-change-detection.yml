---
name: Liquibase PR Schema Check

on:
  workflow_call:
    inputs:
      service_name:
        type: string
        required: true
      liquibase_paths:
        type: string
        required: false
        default: |
          **/src/main/resources/db/migration/*.yml
          **/src/main/resources/db/migration/*.yaml
          **/src/main/resources/db/migration/*.xml
      flyway_paths:
        type: string
        required: false
        default: |
          **/src/main/resources/db/migration/*.sql
          **/src/main/resources/db/migrations/*.sql
      dp_team_name:
        type: string
        required: false
        default: Data Platform
    secrets:
      TEAMS_WEBHOOK_URL:
        required: true

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-and-notify:
    name: Detect Liquibase/Flyway Changes and Notify DP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed Liquibase/Flyway files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          list-files: shell
          filters: |
            liquibase:
              - ${{ inputs.liquibase_paths }}
            flyway:
              - ${{ inputs.flyway_paths }}

      - name: Exit when no Liquibase/Flyway changes
        if: steps.filter.outputs.liquibase != 'true' && steps.filter.outputs.flyway != 'true'
        run: echo "No Liquibase or Flyway changelog file changes detected."

      - name: Build PR diff for Liquibase/Flyway files
        if: steps.filter.outputs.liquibase == 'true' || steps.filter.outputs.flyway == 'true'
        id: diff
        shell: bash
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          FILES="${{ steps.filter.outputs.liquibase_files }} ${{ steps.filter.outputs.flyway_files }}"

          git diff --unified=0 "$BASE_SHA" "$HEAD_SHA" -- $FILES > dbchanges.diff

          {
            echo "changed_files<<EOF"
            printf '%s\n' "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "diff_excerpt<<EOF"
            head -n 300 dbchanges.diff
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
